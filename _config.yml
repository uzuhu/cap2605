# Jekyll Configuration for Huayu Capacitor Website
title: "Nantong Huayu Electronics Co., Ltd."
description: "Professional manufacturer of snap-in and screw terminal aluminum electrolytic capacitors since 1987. Custom specifications for industrial applications."
baseurl: ""
url: "https://www.capacitormanufacturer.com"
author: "Nantong Huayu Electronics Co., Ltd."
email: "zuwho@hotmail.com"
phone: "+86-513-86310599"
mobile: "+86-18912241508"
address: "No. 60 Zhangchuan Road, Zhangzhishan Town, Tongzhou District, Nantong, Jiangsu, China"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  products:
    output: true
    permalink: /products/:path/
  applications:
    output: true
    permalink: /applications/:path/
  blog:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      type: products
    values:
      layout: product
  - scope:
      type: applications
    values:
      layout: application
  - scope:
      type: blog
    values:
      layout: post

# SEO
lang: en
