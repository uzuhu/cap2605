# 南通华裕电子有限公司 - Jekyll Configuration
title: 南通华裕电子有限公司
subtitle: Nantong Huayu Electronics Co., Ltd.
description: >-
  南通华裕电子有限公司始建于1987年，专注特规类铝电解电容器的研发与生产。
  主营牛角型(Snap-in)和螺栓型(Screw Terminal)电解电容，定位"小而精，专而强"。
email: zuwho@hotmail.com
phone: 0513-86310599
mobile: 18912241508
address: 江苏省南通市通州区张芝山镇工业园区张川路60号
logo_text: HUAYU
logo_subtext: 华裕电子
url: "https://capacitormanufacturer.com"
baseurl: ""
github_username: uzuhu
repository: uzuhu/uzuhu.github.io

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
permalink: /:categories/:title/
plugins: []

# Collections
collections:
  snap_in:
    output: true
    permalink: /products/snap-in/:path/
  screw:
    output: true
    permalink: /products/screw/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "_snap_in"
    values:
      layout: product
      type: snap-in
  - scope:
      path: "_screw"
    values:
      layout: product
      type: screw

exclude:
  - pdf/
  - extract_pdfs.py
  - 要求.txt
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .workbuddy/
