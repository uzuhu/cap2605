<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="keywords" content="{{ page.keywords | default: '铝电解电容,电解电容,牛角型电容,螺栓型电容,Snap-in capacitor,Screw terminal capacitor,南通华裕' }}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% include header.html %}
  <main id="main-content">
    {% include breadcrumb.html %}
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.querySelector('.nav-toggle');
      var nav = document.querySelector('.nav-menu');
      if (toggle && nav) {
        toggle.addEventListener('click', function() {
          nav.classList.toggle('active');
          toggle.classList.toggle('active');
          var expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', !expanded);
        });
      }
      // Level-1 dropdown toggle (mobile)
      var level1 = document.querySelectorAll('.nav-item.has-dropdown > a');
      level1.forEach(function(link) {
        link.addEventListener('click', function(e) {
          if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentNode.classList.toggle('open');
          }
        });
      });
      // Level-2 dropdown toggle (mobile)
      var level2 = document.querySelectorAll('.nav-dropdown > li.has-dropdown > a');
      level2.forEach(function(link) {
        link.addEventListener('click', function(e) {
          if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentNode.classList.toggle('open');
          }
        });
      });
    });
  </script>
</body>
</html>
