<!-- Breadcrumb -->
{% unless page.url == '/' %}
<nav class="breadcrumb">
  <div class="container">
    <a href="{{ '/' | relative_url }}">Home</a>
    {% if page.breadcrumb_parent %}
      <span>›</span>
      {% if page.breadcrumb_parent_url %}
        <a href="{{ page.breadcrumb_parent_url | relative_url }}">{{ page.breadcrumb_parent }}</a>
      {% else %}
        <span>{{ page.breadcrumb_parent }}</span>
      {% endif %}
    {% endif %}
    {% if page.breadcrumb_current %}
      <span>›</span>
      <span>{{ page.breadcrumb_current }}</span>
    {% endif %}
  </div>
</nav>
{% endunless %}
