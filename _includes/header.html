<nav class="site-nav" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="logo-text">{{ site.logo_text }}</span>
      <span class="logo-sub">{{ site.logo_subtext }}</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <ul class="nav-menu">
      {% for item in site.data.navigation %}
      <li class="nav-item{% if item.children %} has-dropdown{% endif %}">
        <a href="{{ item.url | relative_url }}"{% if item.children %} aria-haspopup="true"{% endif %}>{{ item.title }}</a>
        {% if item.children %}
        <ul class="nav-dropdown">
          {% for child in item.children %}
          <li><a href="{{ child.url | relative_url }}">{{ child.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>
</nav>
